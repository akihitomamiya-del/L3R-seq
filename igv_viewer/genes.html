<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>L3Rseq — Gene Counts</title>
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    .isoform-legend { margin: 8px 0; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; }
    .isoform-legend span { display: inline-flex; align-items: center; gap: 3px; }
    .iso-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; border: 1px solid #ccc; }

    .discovery-panel { background: #f9f9f9; border: 1px solid #eee; border-radius: 6px;
                       padding: 12px; margin-bottom: 12px; font-size: 12px; }
    .discovery-panel h4 { font-size: 13px; margin-bottom: 6px; color: #555; }

    .empty code { background: #eee; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>L3Rseq Gene Counts</h1>
    <label for="dataset">Dataset:</label>
    <select id="dataset"><option value="">loading...</option></select>
    <a href="/" id="viewer-link">Alignment Viewer</a>
    <span id="locus-badge" style="display:none; font-size:12px; background:#3498db; color:#fff;
          padding:2px 8px; border-radius:10px; cursor:pointer;"
          title="Click to clear gene selection" onclick="clearGeneLocus()"></span>
    <a href="/umi" id="umi-link">UMI Analysis</a>
  </header>
  <script src="/js/shared.js"></script>
  <script>syncNavLinksFromUrl();</script>

  <div id="dataset-desc"></div>

  <div class="panel" id="sample-panel">
    <div class="panel-header" onclick="togglePanel('sample-panel')">
      <span class="arrow open">&#9654;</span>
      <span>Samples</span>
      <span id="sample-count" style="font-weight:normal; color:#888;"></span>
    </div>
    <div class="panel-body open" id="sample-body"></div>
  </div>

  <div class="controls" id="controls" style="display:none;">
    <button class="ctrl-btn active" data-view="chart" onclick="setView('chart')">Chart</button>
    <button class="ctrl-btn" id="zoom-btn" style="display:none;" onclick="toggleChartZoom()"></button>
    <button class="ctrl-btn" data-view="table" onclick="setView('table')">Table</button>
    <button class="ctrl-btn" data-view="isoforms" onclick="setView('isoforms')">Isoforms</button>
    <button class="ctrl-btn" data-view="coverage" onclick="setView('coverage')">Coverage</button>
    <span class="ctrl-sep">|</span>
    <label style="font-weight:600; font-size:12px;">Housekeeping:</label>
    <select id="hk-gene" style="padding:3px 6px; border:1px solid #ccc; border-radius:4px; font-size:13px;">
      <option value="">None</option>
    </select>
    <span class="ctrl-sep">|</span>
    <label style="font-weight:600; font-size:12px;">Gene:</label>
    <select id="gene-select" style="padding:3px 6px; border:1px solid #ccc; border-radius:4px; font-size:13px;">
      <option value="">All</option>
    </select>
    <span class="ctrl-sep">|</span>
    <label style="font-weight:600; font-size:12px;">Show:</label>
    <select id="top-genes" style="padding:3px 6px; border:1px solid #ccc; border-radius:4px; font-size:13px;">
      <option value="10">Top 10</option>
      <option value="20" selected>Top 20</option>
      <option value="50">Top 50</option>
      <option value="0">All genes</option>
    </select>
    <span class="ctrl-sep">|</span>
    <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
      <input type="checkbox" id="show-isoforms"> Per-isoform rows
    </label>
  </div>

  <div class="chart-area" id="chart-area"></div>

  <script src="/chartjs/chart.umd.js"></script>
  <script src="/js/dev-overlay.js"></script>
  <script src="/js/genes.js"></script>
</body>
</html>
