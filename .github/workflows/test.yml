name: Tests
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint pipeline scripts
        run: |
          shellcheck -e SC1090 -e SC1091 -e SC2034 -e SC2154 -e SC2155 \
            -e SC2188 -e SC2320 -S warning \
            L3Rseq \
            scripts/*.sh

  quick-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Install viewer dependencies
        run: cd igv_viewer && npm install --ignore-scripts && node scripts/patch-igv.js
      - name: Run quick test suite
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          bash tests/run_tests.sh --quick --no-viewer
      - name: Snakemake parity (Phase 4 — bash vs. snake byte-identical diff)
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          # Reuses tests/output/pipeline_CT/ from the bash-path step above
          # as the baseline; runs snakemake into tests/output/snake_quick/
          # and diffs corrected.sort.bams + step-11 TSVs. Fails if either
          # path drifts.
          bash tests/run_tests_snake.sh --cores 4
      - name: Install Chrome for Puppeteer
        run: |
          cd igv_viewer
          SHELL_PATH=$(npx puppeteer browsers install chrome-headless-shell --format '{{path}}')
          echo "PUPPETEER_EXECUTABLE_PATH=$SHELL_PATH" >> "$GITHUB_ENV"
      - name: Run viewer tests (Puppeteer)
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          export LD_LIBRARY_PATH="/opt/miniforge/envs/analysis/lib"
          export PUPPETEER_TIMEOUT=30000
          ./L3Rseq viewer --dir tests/output &
          sleep 2
          curl -sf http://localhost:8080/healthz || { echo "Viewer failed to start"; exit 1; }
          cd igv_viewer && node test_buttons.js && node test_stress.js
      - name: Stop viewer
        if: always()
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          ./L3Rseq viewer --stop 2>/dev/null || true

  full-test:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Run full test suite
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          bash tests/run_tests.sh --no-viewer

  snakemake-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Run pipeline through Snakefile (quick fixture, steps 01→10)
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          snakemake --version
          snakemake --configfile config.yaml --cores 4
      - name: Verify per-sample CSVs + read counts
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate NanoporeMap
          fail=0
          for s in barcode01_barcode01_RPI_1 barcode01_barcode01_RPI_2 \
                   barcode02_barcode02_RPI_1 barcode02_barcode02_RPI_2; do
            csv="tests/output/snake_quick/10_csv/${s}.csv"
            if [ ! -f "$csv" ]; then
              echo "FAIL: missing $csv"; fail=1; continue
            fi
            # CSV = 1 header + N data rows; expect ~50–200 reads per sample
            n=$(( $(wc -l < "$csv") - 1 ))
            if [ "$n" -lt 20 ]; then
              echo "FAIL: $s only $n reads (expected ≥20)"; fail=1
            else
              echo "OK: $s = $n reads"
            fi
          done
          exit $fail
      - name: Run step 11 gene counting (requires --config regions=...)
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          snakemake --configfile config.yaml \
                    --config regions=tests/data/test_regions.tsv min_frac=0.3 \
                    --cores 4 --forcerun count
          # Stronger than `test -s`: require at least one data row with a
          # non-zero count. `test -s` would pass on a header-only file, which
          # could hide an RNAME mismatch between test_regions.tsv and the
          # minimap2 output (step 11 would silently count zero reads).
          awk 'NR>1 && $NF+0 > 0' \
              tests/output/snake_quick/11_count/gene_counts_all.tsv \
              | grep -q .
      - name: Verify resume behavior (partial re-run)
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          # Delete one sample's variants + the step 09 sentinel + one CSV
          rm -rf tests/output/snake_quick/08_variants/barcode01/barcode01_RPI_1
          rm -f  tests/output/snake_quick/09_correct/.done
          rm -f  tests/output/snake_quick/10_csv/barcode01_barcode01_RPI_1.csv
          # Dry-run should plan ≪32 jobs (resume), not the full pipeline.
          # Threshold 15: we deleted 1 sample's variants + step 09 sentinel +
          # 1 CSV, which re-triggers variants (1) + step 09 aggregate (1) +
          # affected step 10 CSVs (≤4) + rule `all` (1) = ~7 jobs, with
          # headroom for DAG expansion. A full re-run would be 32 jobs. If
          # this fires, snakemake is re-running work it shouldn't touch.
          planned=$(snakemake --configfile config.yaml --cores 4 --dry-run 2>&1 \
                    | awk '/^total[[:space:]]/ {print $2}' | tail -1)
          echo "Resume plan: $planned jobs"
          if [ "$planned" -gt 15 ]; then
            echo "FAIL: resume planned $planned jobs (expected ≤15)"; exit 1
          fi
          snakemake --configfile config.yaml --cores 4

  python-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Verify config.yaml and load_config.sh fallback are in sync
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          PYTHONPATH=src python3 scripts/check_config_sync.py
      - name: Lint with ruff
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          ruff check src/ tests/python/
      - name: Type-check with mypy
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          mypy src/l3rseq/
      - name: Run pytest with coverage
        shell: bash
        run: |
          export PATH="/opt/miniforge/bin:/opt/miniforge/condabin:$PATH"
          source activate l3rseq_py
          pytest tests/python/ -v --cov=src/l3rseq --cov-report=term-missing
