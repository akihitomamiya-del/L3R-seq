name: Tests
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint pipeline scripts
        run: |
          shellcheck -e SC1091 -e SC2155 -S warning \
            L3Rseq \
            scripts/*.sh

  quick-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Run quick test suite
        run: |
          eval "$(/opt/miniforge/bin/conda shell.bash hook)"
          export PATH="/opt/miniforge/bin:$PATH"
          bash tests/run_tests.sh --quick --no-viewer

  full-test:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0:0
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Run full test suite
        run: |
          eval "$(/opt/miniforge/bin/conda shell.bash hook)"
          export PATH="/opt/miniforge/bin:$PATH"
          bash tests/run_tests.sh --no-viewer
