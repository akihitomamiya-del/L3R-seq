name: Tests
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    # Non-blocking until existing warnings are resolved
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint pipeline scripts
        run: |
          shellcheck -e SC1091 -e SC2155 -S warning \
            L3Rseq \
            scripts/*.sh

  quick-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    env:
      # conda init writes to ~/.bashrc; ensure HOME is writable
      HOME: /tmp/home
    steps:
      - name: Setup environment
        run: |
          mkdir -p /tmp/home
          git config --global --add safe.directory /__w/L3R-seq/L3R-seq
      - uses: actions/checkout@v4
      - name: Run quick test suite
        shell: bash
        run: |
          eval "$(conda shell.bash hook 2>/dev/null || /opt/miniforge/bin/conda shell.bash hook)"
          bash tests/run_tests.sh --quick --no-viewer

  full-test:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/akihitomamiya-del/l3rseq:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    env:
      HOME: /tmp/home
    steps:
      - name: Setup environment
        run: |
          mkdir -p /tmp/home
          git config --global --add safe.directory /__w/L3R-seq/L3R-seq
      - uses: actions/checkout@v4
      - name: Run full test suite
        shell: bash
        run: |
          eval "$(conda shell.bash hook 2>/dev/null || /opt/miniforge/bin/conda shell.bash hook)"
          bash tests/run_tests.sh --no-viewer
